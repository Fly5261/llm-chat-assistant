<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小星AI · 多轮对话助手</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      body {
        background: #f5f9ff;
        min-height: 100vh;
        padding: 20px;
        max-width: 750px;
        margin: 0 auto;
        color: #3a4a5f;
      }

      .header {
        text-align: center;
        margin: 20px 0 25px;
      }
      .header h1 {
        font-size: 26px;
        color: #5a9ee6;
      }
      .header p {
        font-size: 14px;
        color: #8a9cb3;
        margin-top: 4px;
      }

      .api-box {
        background: #ffffff;
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 1px 6px rgba(90, 158, 230, 0.08);
        margin-bottom: 18px;
      }
      .api-box h3 {
        font-size: 15px;
        color: #5a9ee6;
        margin-bottom: 10px;
      }
      #apiKey {
        width: 100%;
        padding: 11px 15px;
        border: 1px solid #e1ebf7;
        border-radius: 12px;
        outline: none;
        font-size: 14px;
        background: #fafbff;
      }

      .functions {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .func-btn {
        padding: 7px 11px;
        border-radius: 10px;
        border: none;
        background: #eaf3ff;
        color: #5a9ee6;
        font-size: 13px;
        cursor: pointer;
      }

      .chat-container {
        background: #ffffff;
        border-radius: 18px;
        box-shadow: 0 1px 6px rgba(90, 158, 230, 0.08);
        overflow: hidden;
        height: 580px;
        display: flex;
        flex-direction: column;
      }

      .messages {
        flex: 1;
        padding: 22px 18px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .msg {
        max-width: 78%;
        padding: 11px 15px;
        border-radius: 16px;
        font-size: 15px;
        line-height: 1.5;
      }
      .user {
        align-self: flex-end;
        background: #5a9ee6;
        color: white;
        border-bottom-right-radius: 6px;
      }
      .bot {
        align-self: flex-start;
        background: #f2f7ff;
        color: #3a4a5f;
        border-bottom-left-radius: 6px;
      }

      .loading {
        text-align: center;
        color: #5a9ee6;
        font-size: 14px;
        padding: 6px;
      }
      .error {
        color: #ff6b6b;
        text-align: center;
        font-size: 14px;
      }

      .input-area {
        display: flex;
        padding: 15px;
        gap: 9px;
        border-top: 1px solid #f0f5ff;
      }
      #userInput {
        flex: 1;
        padding: 12px 16px;
        border-radius: 22px;
        border: 1px solid #e1ebf7;
        outline: none;
        font-size: 15px;
        background: #fafbff;
      }

      button {
        padding: 12px 18px;
        border-radius: 22px;
        border: none;
        background: #5a9ee6;
        color: white;
        font-weight: 500;
        cursor: pointer;
      }
      #clearBtn {
        background: #eaf3ff;
        color: #5a9ee6;
      }

      .messages::-webkit-scrollbar {
        width: 4px;
      }
      .messages::-webkit-scrollbar-thumb {
        background: #d0e0f5;
        border-radius: 4px;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>💙 小星AI · 多轮对话助手</h1>
      <p>阿里云百炼 qwen3.6-plus </p>
    </div>

    <div class="api-box">
      <h3>🔑 阿里云百炼 API Key</h3>
      <input type="password" id="apiKey" placeholder="请输入你的API Key" />
    </div>

    <div class="functions">
      <button class="func-btn" onclick="insertPrompt('总结上文')">
        总结上文
      </button>
      <button class="func-btn" onclick="insertPrompt('简单解释')">
        简单解释
      </button>
      <button class="func-btn" onclick="insertPrompt('帮我润色')">
        润色文字
      </button>
      <button class="func-btn" onclick="insertPrompt('列出3个要点')">
        生成要点
      </button>
    </div>

    <div class="chat-container">
      <div class="messages" id="messages">
        <div class="msg bot">
          你好～我是小星AI，支持多轮对话，随时可以问我 😊
        </div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="userInput"
          placeholder="输入消息，按 Enter 发送"
        />
        <button id="sendBtn">发送</button>
        <button id="clearBtn">清空</button>
      </div>
    </div>

    <script>
      let messages = [
        {
          role: "system",
          content:
            "你是温柔治愈的AI助手，回答清晰、简洁、有耐心，支持多轮对话。",
        },
      ];

      const messagesEl = document.getElementById("messages");
      const userInput = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");
      const clearBtn = document.getElementById("clearBtn");
      const apiKeyEl = document.getElementById("apiKey");

      sendBtn.addEventListener("click", sendMessage);
      userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      clearBtn.addEventListener("click", () => {
        messages = [messages[0]];
        messagesEl.innerHTML = `<div class="msg bot">你好～我是小星AI，支持多轮对话，随时可以问我 😊</div>`;
      });

      function insertPrompt(text) {
        userInput.value = text;
        userInput.focus();
      }

      async function sendMessage() {
        const key = apiKeyEl.value.trim();
        const text = userInput.value.trim();

        if (!key) {
          addMsg("请先输入API Key", "error");
          return;
        }
        if (!text) return;

        addMsg(text, "user");
        userInput.value = "";
        messages.push({ role: "user", content: text });

        const loading = document.createElement("div");
        loading.className = "loading";
        loading.textContent = "正在思考...";
        messagesEl.appendChild(loading);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        try {
          const res = await fetch(
            "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions",
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${key}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                model: "qwen3.6-plus",
                messages: messages,
              }),
            },
          );

          messagesEl.removeChild(loading);
          if (!res.ok)
            throw new Error(
              await res.json().then((e) => e.error?.message || "请求失败"),
            );

          const data = await res.json();
          const reply = data.choices[0].message.content;
          addMsg(reply, "bot");
          messages.push({ role: "assistant", content: reply });
        } catch (err) {
          messagesEl.removeChild(loading);
          addMsg(`出错：${err.message}`, "error");
        }
      }

      function addMsg(text, type) {
        const div = document.createElement("div");
        div.className = `msg ${type}`;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    </script>
  </body>
</html>
